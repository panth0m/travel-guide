<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>🗼 도쿄 여행 루트 가이드</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;}
.app{display:grid;grid-template-columns:420px 1fr;height:100vh;overflow:hidden;}

/* 왼쪽 패널 */
.panel{overflow-y:auto;background:#f5f5f3;display:flex;flex-direction:column;}
.panel-header{background:#fff;border-bottom:1px solid #e8e8e4;padding:16px 18px;position:sticky;top:0;z-index:10;}
.panel-header h1{font-size:18px;font-weight:700;color:#1a1a18;}
.panel-header h1 span{color:#E8380D;}
.panel-header p{font-size:12px;color:#888;margin-top:3px;}

/* 날짜/인원 설정 */
.settings{padding:14px 18px;background:#fff;border-bottom:1px solid #e8e8e4;}
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.settings-row:last-child{margin-bottom:0;}
.sgroup{display:flex;flex-direction:column;gap:3px;}
.sgroup label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;}
.sgroup input,.sgroup select{padding:7px 10px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;background:#f9f9f7;color:#1a1a18;font-family:inherit;}
.sgroup input:focus,.sgroup select:focus{outline:none;border-color:#E8380D;}
.date-result{font-size:12px;color:#555;background:#f0f0ec;border-radius:7px;padding:6px 10px;margin-top:6px;}

/* 등급 탭 */
.grade-tabs{display:flex;gap:0;padding:14px 18px 0;background:#fff;border-bottom:1px solid #e8e8e4;}
.grade-tab{flex:1;padding:9px 6px;text-align:center;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.grade-tab:hover{background:#f9f9f7;}
.grade-tab.active{border-bottom-color:#E8380D;}
.grade-tab-icon{font-size:16px;display:block;}
.grade-tab-name{font-size:12px;font-weight:700;display:block;margin-top:2px;color:#1a1a18;}
.grade-tab-cost{font-size:10px;color:#999;display:block;}
.grade-tab.active .grade-tab-name{color:#E8380D;}

/* 루트 카드 목록 */
.routes-list{padding:12px 18px;flex:1;}
.routes-title{font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.route-card{background:#fff;border:1.5px solid #e8e8e4;border-radius:12px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
.route-card:hover{border-color:#E8380D;transform:translateY(-1px);}
.route-card.active{border-color:#E8380D;background:#fff9f8;}
.rc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.rc-num{width:28px;height:28px;border-radius:50%;background:#E8380D;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rc-num.budget{background:#888780;} .rc-num.value{background:#1D9E75;} .rc-num.normal{background:#185FA5;} .rc-num.luxury{background:#7F77DD;}
.rc-title{font-size:14px;font-weight:700;color:#1a1a18;line-height:1.3;}
.rc-sub{font-size:12px;color:#666;margin-top:2px;line-height:1.4;}
.rc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.rc-tag{font-size:11px;padding:2px 8px;border-radius:999px;background:#f3f3f0;border:0.5px solid #e0e0dc;color:#555;}
.rc-spots{font-size:12px;color:#888;display:flex;align-items:center;gap:5px;}
.rc-cost{font-size:12px;font-weight:700;margin-left:auto;}
.c-budget{color:#5F5E5A;} .c-value{color:#0F6E56;} .c-normal{color:#185FA5;} .c-luxury{color:#534AB7;}

/* 상세 일정 패널 */
.detail-panel{display:none;padding:14px 18px;}
.detail-panel.visible{display:block;}
.detail-back{background:none;border:0.5px solid #ddd;border-radius:8px;padding:7px 13px;font-size:12px;color:#666;cursor:pointer;margin-bottom:12px;font-family:inherit;}
.detail-back:hover{background:#f0f0ec;}
.detail-title{font-size:16px;font-weight:700;color:#1a1a18;margin-bottom:4px;}
.detail-sub{font-size:13px;color:#666;margin-bottom:12px;line-height:1.5;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{background:#f5f5f3;border:0.5px solid #e0e0dc;border-radius:7px;padding:4px 10px;font-size:12px;color:#555;}
.chip span{font-weight:700;color:#1a1a18;}

/* Day 탭 */
.day-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.day-tab{padding:6px 12px;border:0.5px solid #ddd;border-radius:999px;font-size:12px;cursor:pointer;background:#f9f9f7;color:#666;transition:all .15s;font-family:inherit;}
.day-tab.active{background:#E8380D;color:#fff;border-color:#E8380D;}

/* 스톱 */
.stop-list{display:flex;flex-direction:column;gap:0;}
.stop-item{display:flex;gap:12px;position:relative;padding-bottom:14px;}
.stop-item:last-child{padding-bottom:0;}
.stop-item:not(:last-child)::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:1px;background:#e0e0dc;}
.stop-dot{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;z-index:1;}
.dot-sight{background:#E8380D;} .dot-food{background:#FF8C00;} .dot-hotel{background:#7F77DD;}
.dot-transport{background:#888780;} .dot-activity{background:#1D9E75;} .dot-kids{background:#E91E8C;}
.stop-info{flex:1;}
.stop-name{font-size:13px;font-weight:700;color:#1a1a18;}
.stop-time{font-size:11px;color:#999;margin-left:5px;font-weight:400;}
.stop-desc{font-size:12px;color:#666;margin-top:2px;line-height:1.5;}
.stop-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;align-items:center;}
.stop-badge{font-size:11px;padding:2px 7px;border-radius:999px;}
.b-sight{background:#FEEAE7;color:#C0341D;} .b-food{background:#FFF3E0;color:#E65100;}
.b-hotel{background:#EEEDFE;color:#3C3489;} .b-transport{background:#F1EFE8;color:#444441;}
.b-activity{background:#E1F5EE;color:#085041;} .b-kids{background:#FCE4EC;color:#880E4F;}
.stop-cost{font-size:11px;font-weight:700;color:#0F6E56;}
.transit-bubble{display:inline-flex;align-items:center;gap:4px;background:#f3f3f0;border:0.5px solid #e0e0dc;border-radius:999px;padding:3px 9px;font-size:11px;color:#555;margin:5px 0 5px 39px;}

/* 예약 링크 */
.booking-section{margin-top:16px;}
.booking-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.booking-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.booking-link{display:block;text-decoration:none;background:#fff;border:0.5px solid #e0e0dc;border-radius:10px;padding:10px 11px;transition:all .15s;}
.booking-link:hover{border-color:#E8380D;background:#fff9f8;}
.bl-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.bl-icon{font-size:15px;}
.bl-name{font-size:12px;font-weight:700;color:#1a1a18;}
.bl-badge{font-size:10px;padding:1px 6px;border-radius:999px;background:#FEEAE7;color:#C0341D;font-weight:600;}
.bl-desc{font-size:11px;color:#888;line-height:1.4;}

/* 꿀팁 */
.tips-section{margin-top:16px;padding-bottom:20px;}
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.tip-item{background:#fff;border-radius:9px;padding:10px 11px;border:0.5px solid #e8e8e4;}
.tip-label{font-size:11px;font-weight:700;color:#1a1a18;margin-bottom:3px;}
.tip-body{font-size:12px;color:#555;line-height:1.5;}

/* 지도 */
#map{flex:1;height:100vh;}
.map-wrap{position:relative;flex:1;}

/* 지도 범례 */
.map-legend{position:absolute;bottom:20px;left:10px;z-index:1000;background:rgba(255,255,255,.95);border-radius:10px;padding:10px 13px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.legend-title{font-weight:700;color:#1a1a18;margin-bottom:6px;}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;color:#555;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Day 배지 (지도 팝업) */
.leaflet-popup-content{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;min-width:160px;}
.popup-name{font-weight:700;color:#1a1a18;margin-bottom:3px;}
.popup-time{font-size:11px;color:#999;}
.popup-desc{font-size:12px;color:#555;margin-top:4px;line-height:1.4;}
.popup-cost{font-size:11px;font-weight:700;color:#0F6E56;margin-top:3px;}

/* 모바일 */
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .panel{max-height:55vh;}
  #map{height:45vh;}
  .map-wrap{order:-1;}
}
</style>
</head>
<body>
<div class="app">
  <!-- 왼쪽 패널 -->
  <div class="panel" id="panel">
    <div class="panel-header">
      <h1>🗼 <span>도쿄</span> 여행 루트 가이드</h1>
      <p>인천 출발 · 등급별 5가지 완성 루트 · 지도 동선 시각화</p>
    </div>

    <!-- 날짜/인원 설정 -->
    <div class="settings">
      <div class="settings-row">
        <div class="sgroup"><label>출발 날짜</label><input type="date" id="start-date"/></div>
        <div class="sgroup"><label>귀국 날짜</label><input type="date" id="end-date"/></div>
      </div>
      <div class="settings-row">
        <div class="sgroup">
          <label>성인</label>
          <select id="adult-count">
            <option value="1">1명</option><option value="2" selected>2명</option>
            <option value="3">3명</option><option value="4">4명</option>
          </select>
        </div>
        <div class="sgroup">
          <label>어린이</label>
          <select id="child-count">
            <option value="0" selected>0명</option><option value="1">1명</option>
            <option value="2">2명</option><option value="3">3명</option>
          </select>
        </div>
      </div>
      <div class="date-result" id="date-result">날짜를 선택하면 여행 기간이 계산됩니다.</div>
    </div>

    <!-- 등급 탭 -->
    <div class="grade-tabs" id="grade-tabs">
      <button class="grade-tab active" data-grade="budget">
        <span class="grade-tab-icon">🎒</span>
        <span class="grade-tab-name">최저가</span>
        <span class="grade-tab-cost">30~55만원</span>
      </button>
      <button class="grade-tab" data-grade="value">
        <span class="grade-tab-icon">👍</span>
        <span class="grade-tab-name">가성비</span>
        <span class="grade-tab-cost">55~90만원</span>
      </button>
      <button class="grade-tab" data-grade="normal">
        <span class="grade-tab-icon">🏨</span>
        <span class="grade-tab-name">보통</span>
        <span class="grade-tab-cost">90~150만원</span>
      </button>
      <button class="grade-tab" data-grade="luxury">
        <span class="grade-tab-icon">✨</span>
        <span class="grade-tab-name">럭셔리</span>
        <span class="grade-tab-cost">150만원+</span>
      </button>
    </div>

    <!-- 루트 카드 목록 -->
    <div class="routes-list" id="routes-list">
      <div class="routes-title" id="routes-title">최저가 · 5가지 루트</div>
      <div id="route-cards"></div>
    </div>

    <!-- 상세 패널 -->
    <div class="detail-panel" id="detail-panel">
      <button class="detail-back" id="detail-back">← 루트 목록으로</button>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-sub" id="detail-sub"></div>
      <div class="chips" id="detail-chips"></div>
      <div class="day-tabs" id="day-tabs"></div>
      <div class="stop-list" id="stop-list"></div>
      <div class="booking-section">
        <div class="booking-title">예약 바로가기</div>
        <div class="booking-grid" id="booking-grid"></div>
      </div>
      <div class="tips-section">
        <div class="booking-title">여행 꿀팁</div>
        <div class="tips-grid" id="tips-grid"></div>
      </div>
    </div>
  </div>

  <!-- 지도 -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-title">장소 유형</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E8380D"></div>관광지</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF8C00"></div>맛집</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7F77DD"></div>숙소</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>액티비티</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E91E8C"></div>아이 동반</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

/* ══════════════════════════════════════
   앱 로직
══════════════════════════════════════ */
var map, routeLayer = null, markerLayer = null;
var currentGrade = 'budget';
var currentRoute = null;
var currentDay = 1;

/* 지도 초기화 */
function initMap(){
  map = L.map('map', {zoomControl:true}).setView([35.6762, 139.6503], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors', maxZoom:19
  }).addTo(map);
  routeLayer = L.layerGroup().addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

/* 마커 색상 */
function dotColor(type){
  var m={sight:'#E8380D',food:'#FF8C00',hotel:'#7F77DD',transport:'#888780',activity:'#1D9E75',kids:'#E91E8C'};
  return m[type]||'#E8380D';
}
function makeIcon(type, num){
  var c=dotColor(type);
  return L.divIcon({
    className:'',
    html:'<div style="width:28px;height:28px;background:'+c+';border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.3)">'+num+'</div>',
    iconSize:[28,28], iconAnchor:[14,14]
  });
}

/* 지도에 루트 그리기 */
function drawRoute(route, day){
  routeLayer.clearLayers();
  markerLayer.clearLayers();
  var stops = route.days.find(function(d){ return d.day===day; });
  if(!stops) return;
  var pts=[], validStops=stops.stops.filter(function(s){ return s.lat&&s.lng&&s.lat!==37.4602; });
  validStops.forEach(function(st, i){
    var mk = L.marker([st.lat,st.lng],{icon:makeIcon(st.type,i+1)}).addTo(markerLayer);
    mk.bindPopup('<div class="popup-name">'+(i+1)+'. '+st.name+'</div>'+(st.time?'<div class="popup-time">'+st.time+'</div>':'')+'<div class="popup-desc">'+st.desc+'</div>'+(st.cost?'<div class="popup-cost">'+st.cost+'</div>':''));
    pts.push([st.lat,st.lng]);
  });
  if(pts.length>1){
    L.polyline(pts,{color:'#E8380D',weight:2.5,opacity:.7,dashArray:'6,5'}).addTo(routeLayer);
  }
  if(pts.length>0) map.fitBounds(L.latLngBounds(pts).pad(.2));
}

/* 등급 탭 */
document.querySelectorAll('.grade-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.grade-tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    currentGrade = tab.dataset.grade;
    currentRoute = null;
    showRouteList();
  });
});

/* 루트 목록 렌더링 */
function showRouteList(){
  var list = document.getElementById('routes-list');
  var dp = document.getElementById('detail-panel');
  list.style.display='block'; dp.classList.remove('visible');

  var gradeNames={budget:'최저가',value:'가성비',normal:'보통',luxury:'럭셔리'};
  document.getElementById('routes-title').textContent = gradeNames[currentGrade]+' · '+ROUTES[currentGrade].length+'가지 루트';

  var html='';
  ROUTES[currentGrade].forEach(function(r,i){
    var tags=r.tags.map(function(t){ return '<span class="rc-tag">'+t+'</span>'; }).join('');
    html+='<div class="route-card" data-id="'+r.id+'">'
      +'<div class="rc-header">'
        +'<div class="rc-num '+r.numCls+'">'+(i+1)+'</div>'
        +'<div><div class="rc-title">'+r.title+'</div><div class="rc-sub">'+r.sub+'</div></div>'
      +'</div>'
      +'<div class="rc-tags">'+tags+'</div>'
      +'<div class="rc-spots">'
        +'<span>📅 '+r.days.length+'일 일정</span>'
        +'<span>·</span><span>📍 '+r.days.reduce(function(a,d){ return a+d.stops.length; },0)+'개 장소</span>'
        +'<span class="rc-cost '+r.costCls+'">'+r.cost+'</span>'
      +'</div>'
    +'</div>';
  });
  document.getElementById('route-cards').innerHTML=html;

  document.querySelectorAll('.route-card').forEach(function(card){
    card.addEventListener('click',function(){
      var route = ROUTES[currentGrade].find(function(r){ return r.id===card.dataset.id; });
      if(route) showDetail(route);
    });
  });

  /* 첫 번째 루트 지도에 표시 */
  var first = ROUTES[currentGrade][0];
  if(first) drawRoute(first, 1);
}

/* 상세 패널 */
function showDetail(route){
  currentRoute=route; currentDay=1;
  document.getElementById('routes-list').style.display='none';
  var dp=document.getElementById('detail-panel');
  dp.classList.add('visible');

  document.getElementById('detail-title').textContent=route.title;
  document.getElementById('detail-sub').textContent=route.sub;

  /* 칩 */
  document.getElementById('detail-chips').innerHTML=[
    '<div class="chip">📅 <span>'+route.days.length+'일 일정</span></div>',
    '<div class="chip">💴 <span>'+route.cost+'</span></div>',
    route.tags.map(function(t){ return '<div class="chip">'+t+'</div>'; }).join('')
  ].join('');

  /* Day 탭 */
  var dayHtml=route.days.map(function(d){
    return '<button class="day-tab'+(d.day===1?' active':'')+'" data-day="'+d.day+'">Day '+d.day+'<br><span style="font-size:10px;font-weight:400;">'+d.label.slice(0,8)+'</span></button>';
  }).join('');
  document.getElementById('day-tabs').innerHTML=dayHtml;
  document.querySelectorAll('.day-tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.day-tab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentDay=Number(btn.dataset.day);
      renderStops(route, currentDay);
      drawRoute(route, currentDay);
    });
  });

  renderStops(route, 1);
  renderBooking(currentGrade);
  renderTips(route);
  drawRoute(route, 1);
}

/* 스톱 렌더링 */
function renderStops(route, day){
  var d=route.days.find(function(x){ return x.day===day; });
  if(!d) return;
  var typeBadge={sight:'b-sight',food:'b-food',hotel:'b-hotel',transport:'b-transport',activity:'b-activity',kids:'b-kids'};
  var typeLabel={sight:'관광',food:'맛집',hotel:'숙소',transport:'이동',activity:'액티비티',kids:'아이 OK'};
  var dotCls={sight:'dot-sight',food:'dot-food',hotel:'dot-hotel',transport:'dot-transport',activity:'dot-activity',kids:'dot-kids'};
  var html='';
  d.stops.forEach(function(st,i){
    var transit=st.transit?'<div class="transit-bubble">🚇 '+st.transit+'</div>':'';
    if(i>0) html+=transit;
    html+='<div class="stop-item">'
      +'<div class="stop-dot '+(dotCls[st.type]||'dot-sight')+'">'+(i+1)+'</div>'
      +'<div class="stop-info">'
        +'<div class="stop-name">'+st.name+(st.time?'<span class="stop-time">'+st.time+'</span>':'')+'</div>'
        +'<div class="stop-desc">'+st.desc+'</div>'
        +'<div class="stop-meta">'
          +'<span class="stop-badge '+(typeBadge[st.type]||'b-sight')+'">'+(typeLabel[st.type]||'관광')+'</span>'
          +(st.cost?'<span class="stop-cost">'+st.cost+'</span>':'')
        +'</div>'
      +'</div>'
    +'</div>';
  });
  document.getElementById('stop-list').innerHTML=html;
}

/* 꿀팁 */
function renderTips(route){
  document.getElementById('tips-grid').innerHTML=route.tips.map(function(t){
    return '<div class="tip-item"><div class="tip-label">'+t.label+'</div><div class="tip-body">'+t.body+'</div></div>';
  }).join('');
}

/* 날짜/인원 상태 */
function state(){
  return {
    start:document.getElementById('start-date').value,
    end:document.getElementById('end-date').value,
    adults:Number(document.getElementById('adult-count').value||2),
    children:Number(document.getElementById('child-count').value||0)
  };
}

/* 날짜 미리보기 */
function updateDateResult(){
  var s=document.getElementById('start-date').value;
  var e=document.getElementById('end-date').value;
  var el=document.getElementById('date-result');
  if(!s||!e){el.textContent='날짜를 선택하면 여행 기간이 계산됩니다.';return;}
  var sd=new Date(s),ed=new Date(e);
  var diff=Math.round((ed-sd)/86400000);
  if(diff<0){el.textContent='귀국 날짜를 확인해 주세요.';return;}
  var days=['일','월','화','수','목','금','토'];
  el.textContent=s+' ('+days[sd.getDay()]+') ~ '+e+' ('+days[ed.getDay()]+') · '+diff+'박 '+(diff+1)+'일';
}

/* 이벤트 */
document.getElementById('start-date').addEventListener('change',updateDateResult);
document.getElementById('end-date').addEventListener('change',updateDateResult);
document.getElementById('detail-back').addEventListener('click',function(){
  document.getElementById('detail-panel').classList.remove('visible');
  document.getElementById('routes-list').style.display='block';
  var first=ROUTES[currentGrade][0]; if(first) drawRoute(first,1);
});

/* 기본 날짜 */
(function(){
  var today=new Date();
  var fmt=function(d){ return d.getFullYear()+'-'+(''+(d.getMonth()+1)).padStart(2,'0')+'-'+(''+d.getDate()).padStart(2,'0'); };
  document.getElementById('start-date').value=fmt(today);
  var end=new Date(today); end.setDate(end.getDate()+4);
  document.getElementById('end-date').value=fmt(end);
  updateDateResult();
})();

initMap();
showRouteList();

})();
